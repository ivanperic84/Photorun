// ── SETUP ─────────────────────────────────────────────────────────────────────
const CV=document.getElementById('c'),g=CV.getContext('2d');
const IW=640,IH=360;CV.width=IW;CV.height=IH;
let SCALE=1;
function resize(){SCALE=Math.min(innerWidth/IW,innerHeight/IH);CV.style.width=IW*SCALE+'px';CV.style.height=IH*SCALE+'px';}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
const MG=AC.createGain();MG.gain.value=0.34;MG.connect(AC.destination);
function tone(f,type,t,dur,vol=0.12){
  const o=AC.createOscillator(),gn=AC.createGain();
  o.connect(gn);gn.connect(MG);o.type=type;o.frequency.value=f;
  gn.gain.setValueAtTime(vol,t);gn.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur+0.02);
}
function snd_jump(high=false){const t=AC.currentTime;const f=high?300:180;tone(f,'square',t,.04,.07);tone(f*2,'square',t+.03,.07,.07);}
function snd_flash(){const t=AC.currentTime;tone(1400,'square',t,.03,.13);tone(700,'square',t+.02,.05,.1);tone(300,'square',t+.05,.12,.08);}
function snd_shutter(){const t=AC.currentTime;tone(900,'square',t,.02,.06);tone(500,'square',t+.02,.03,.04);}
function snd_stun(){const t=AC.currentTime;[220,165,110].forEach((f,i)=>tone(f,'sawtooth',t+i*.04,.1,.1));}
function snd_stomp(){const t=AC.currentTime;tone(150,'square',t,.04,.15);tone(280,'square',t,.06,.09);}
function snd_collect(){const t=AC.currentTime;[523,659,784,1047,1319].forEach((f,i)=>tone(f,'square',t+i*.06,.09,.1));}
function snd_die(){const t=AC.currentTime;const o=AC.createOscillator(),gn=AC.createGain();o.connect(gn);gn.connect(MG);o.type='sawtooth';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(40,t+.6);gn.gain.setValueAtTime(.16,t);gn.gain.exponentialRampToValueAtTime(.001,t+.6);o.start(t);o.stop(t+.65);}
function snd_lvl(){const t=AC.currentTime;[392,523,659,784,1047,784,1047,1319].forEach((f,i)=>tone(f,'square',t+i*.09,.12,.13));}
function snd_bd(){const t=AC.currentTime,n=[264,264,297,264,352,330,0,264,264,297,264,396,352,0,264,264,528,440,352,330,297,0,467,467,440,352,396,352],d=[0,.28,.56,.84,1.12,1.68,2,2.24,2.52,2.8,3.08,3.36,3.92,4.2,4.48,4.76,5.04,5.32,5.6,5.88,6.44,6.72,7,7.28,7.56,7.84,8.12,8.68];n.forEach((f,i)=>f>0&&tone(f,'square',t+d[i],.22,.14));}
const MUSIC=[
  {spd:.13,mel:[0,440,0,523,440,0,392,440,523,0,659,0,523,440,392,0,0,494,0,587,494,440,392,0,440,0,523,587,659,0,587,0],bas:[110,0,0,110,0,0,147,0,110,0,0,110,0,0,130,0,98,0,0,98,0,0,110,0,110,0,0,110,0,0,147,0]},

  {spd:.12,mel:[220,0,220,330,0,440,330,0,392,0,440,0,494,440,392,0,220,0,330,0,440,0,494,0,523,494,440,0,392,330,220,0],bas:[55,0,55,0,73,0,73,0,55,0,73,0,82,0,82,0,55,0,55,0,73,0,73,0,82,0,82,0,55,0,55,0]},

function startBg(idx=0){stopBg();BGP=true;bgMusicIdx=idx;bgLoop();}
function stopBg(){BGP=false;}

// ── INPUT ─────────────────────────────────────────────────────────────────────
const K={};let jDown=false,touchMode=false;
function tryFullscreen(){const el=document.documentElement;if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();}
document.addEventListener('keydown',e=>{
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  K[e.code]=true;AC.resume();tryFullscreen();
  if(GS==='menu'&&(e.code==='Space'||e.code==='Enter'))startGame();
  if(GS==='levelcomplete'&&(e.code==='Space'||e.code==='Enter'))nextLevel();
  if(GS==='gameover'&&(e.code==='Space'||e.code==='Enter'))startGame();
  if(GS==='birthday'&&(e.code==='Space'||e.code==='Enter')){GS='menu';stopBg();startBg(3);}
  if(GS==='playing'&&(e.code==='KeyF'||e.code==='KeyX'))doFlash();
});
document.addEventListener('keyup',e=>{K[e.code]=false;});
// Touch: linke Seite halten = laufen, zwei runde Buttons rechts (oben=springen, unten=blitzen)
let touchRun=false,touchRunLeft=false;
const BTN_R=36;
let runTouchId=null,runLeftTouchId=null;
function getBtnCenter(){return{rx:IW-56,jy:IH-115,fy:IH-40};}
function inBtn(tx,ty,bx,by){const r=CV.getBoundingClientRect();const rx=(tx-r.left)/SCALE,ry=(ty-r.top)/SCALE;return Math.hypot(rx-bx,ry-by)<BTN_R;}
const RUN_R_X=46,RUN_L_X=46+BTN_R*2+10,RUN_Y=IH-40;
function isRunRBtn(tx,ty){const r=CV.getBoundingClientRect();const rx=(tx-r.left)/SCALE,ry=(ty-r.top)/SCALE;return Math.hypot(rx-RUN_R_X,ry-RUN_Y)<BTN_R;}
function isRunLBtn(tx,ty){const r=CV.getBoundingClientRect();const rx=(tx-r.left)/SCALE,ry=(ty-r.top)/SCALE;return Math.hypot(rx-RUN_L_X,ry-RUN_Y)<BTN_R;}
CV.addEventListener('touchstart',e=>{
  e.preventDefault();AC.resume();tryFullscreen();touchMode=true;
  if(GS==='playing'){
    const b=getBtnCenter();
    [...e.changedTouches].forEach(t=>{
      if(inBtn(t.clientX,t.clientY,b.rx,b.fy))doFlash();
      else if(inBtn(t.clientX,t.clientY,b.rx,b.jy)){if(P.jumps>0&&!jDown)doJump();}
      else if(isRunRBtn(t.clientX,t.clientY)){touchRunLeft=true;runLeftTouchId=t.identifier;}
      else if(isRunLBtn(t.clientX,t.clientY)){touchRun=true;runTouchId=t.identifier;}
    });
  } else {
    if(GS==='menu')startGame();
    else if(GS==='levelcomplete')nextLevel();
    else if(GS==='gameover')startGame();
    else if(GS==='birthday'){GS='menu';stopBg();startBg(3);}
  }
},{passive:false});
CV.addEventListener('touchend',e=>{e.preventDefault();
  [...e.changedTouches].forEach(t=>{
    if(t.identifier===runTouchId){touchRun=false;runTouchId=null;}
    if(t.identifier===runLeftTouchId){touchRunLeft=false;runLeftTouchId=null;}
  });
  if(e.touches.length===0){touchRun=false;touchRunLeft=false;runTouchId=null;runLeftTouchId=null;jDown=false;}
},{passive:false});
CV.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

function spr(arr,pal,wx,wy,flip=false){for(let r=0;r<arr.length;r++){const row=arr[r];for(let c=0;c<row.length;c++){const ci=row[c];if(!ci||!pal[ci])continue;g.fillStyle=pal[ci];const dc=flip?row.length-1-c:c;g.fillRect(wx+dc*PS,wy+r*PS,PS,PS);}}}
function sprGlow(arr,pal,wx,wy,flip,gc,ga){g.shadowBlur=ga;g.shadowColor=gc;spr(arr,pal,wx,wy,flip);g.shadowBlur=0;}

// ── PARTICLES & BG ENTITIES ───────────────────────────────────────────────────
let parts=[];
function addParts(x,y,n,cols,spd=3,life=1,sz=2.5){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*spd+.5;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-Math.random()*2,life,ml:life,col:cols[Math.floor(Math.random()*cols.length)],sz:Math.random()*sz+1});}}
function updateParts(){for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.022;}parts=parts.filter(p=>p.life>0);}
function drawParts(){for(const p of parts){g.globalAlpha=p.life/p.ml;g.shadowBlur=6;g.shadowColor=p.col;g.fillStyle=p.col;g.fillRect(p.x,p.y,p.sz,p.sz);}g.globalAlpha=1;g.shadowBlur=0;}
let bgEnts=[];
function spawnBgEnt(){if(!lvl)return;if(lvl.bg==='dino')bgEnts.push({type:'ptero',x:IW+40,y:40+Math.random()*100,vx:-(2+Math.random()),phase:Math.random()*Math.PI*2});if(lvl.bg==='tokyo')bgEnts.push({type:'car',x:-70,y:GY-10,vx:3+Math.random()*2.5,col:['#ff0088','#00ffcc','#ffcc00','#ff6600'][Math.floor(Math.random()*4)]});if(lvl.bg==='bau')for(let i=0;i<4;i++)addParts(40+Math.random()*(IW-80),GY-30-Math.random()*80,1,['#ffcc00','#ff8800','#ffffff'],2.5,.9,2);}

// ── STATE ─────────────────────────────────────────────────────────────────────
let GS='menu',curLv=0,lives=3,photosGot=0,tick=0,dTick=0,cTick=0,bdTick=0;
let lvl,enems,colls,camX=0,camXT=0;
let flashCD=0,flashAmt=0,shakeAmt=0;
const P={x:0,y:0,vx:0,vy:0,onG:false,right:true,wf:0,wt:0,dead:false,inv:0,jumps:2};
let flashes=[];
let menuCamFlash=0;

function startGame(){curLv=0;lives=3;loadLv(0);GS='playing';}
// Store original platform x positions for reset
function loadLv(i){
  const d=LEVELS[i];lvl=d;
  colls=d.colls.map(c=>({...c,got:false}));
  enems=d.enems.map(e=>({...e}));
  P.x=d.spawn.x;P.y=d.spawn.y;P.vx=0;P.vy=0;P.dead=false;P.inv=0;P.onG=false;P.jumps=2;
  photosGot=0;camX=0;camXT=0;tick=0;flashCD=0;flashAmt=0;shakeAmt=0;
  flashes=[];parts=[];bgEnts=[];bgRipples=[];
  startBg(d.musicIdx);
}
function respawn(){P.x=lvl.spawn.x;P.y=lvl.spawn.y;P.vx=0;P.vy=0;P.dead=false;P.inv=80;P.onG=false;P.jumps=2;flashes=[];}
function nextLevel(){curLv++;if(curLv>=LEVELS.length){GS='birthday';bdTick=0;stopBg();snd_bd();}else{loadLv(curLv);GS='playing';}}
function killP(){P.dead=true;dTick=55;snd_die();shakeAmt=7;addParts(P.x-camX+PW/2,P.y+PH/2,24,['#ff4400','#ff8800','#ffcc00'],4,1.5,3);}

function doJump(high=false){
  if(P.jumps<=0)return;
  const isDouble=!P.onG;
  P.vy=isDouble?-9.0:-9.8;P.onG=false;P.jumps--;jDown=true;
  snd_jump(isDouble);
  addParts(P.x-camX+PW/2,P.y+PH,isDouble?12:8,isDouble?['#88aaff','#4466ff','#ffffff']:['#666','#999'],isDouble?3:1.8,isDouble?.8:.5,isDouble?3:2);
  if(isDouble){flashes.push({x:P.x+PW/2,y:P.y+PH/2,r:0,a:.6,col:'#4466ff'});}
}
function doFlash(){
  if(flashCD>0||P.dead)return;
  flashCD=80;flashAmt=1;snd_flash();shakeAmt=3;
  flashes.push({x:P.x+PW/2,y:P.y+PH/3,r:0,a:1,col:'#ffffff'});
  flashes.push({x:P.x+PW/2,y:P.y+PH/3,r:4,a:.7,col:lvl?lvl.neonCol:'#ffff00'});
  const cx=P.x+PW/2,cy=P.y+PH/2;let hit=false;
  for(const e of enems){if(Math.hypot(cx-(e.x+EW/2),cy-(e.y+EH/2))<180){e.stun=160;hit=true;addParts(e.x-camX+EW/2,e.y+EH/2,20,['#fff','#ffff88',lvl.neonCol],3.5,1.2,3);}}
  if(hit)snd_stun();
  addParts(P.x-camX+PW/2,P.y+PH/3,16,['#ffffff','#ffffaa'],5,1,2.5);
}

function aabb(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

function update(){
  if(GS!=='playing')return;
  tick++;
  if(flashCD>0)flashCD--;if(flashAmt>0)flashAmt=Math.max(0,flashAmt-.07);if(shakeAmt>0)shakeAmt*=.76;
  if(tick%150===0)spawnBgEnt();

  if(P.dead){dTick--;if(dTick<=0){lives--;if(lives<=0){GS='gameover';stopBg();}else respawn();}return;}
  if(P.inv>0)P.inv--;

  const goL=K['ArrowLeft']||K['KeyA']||touchRunLeft;
  const goR=K['ArrowRight']||K['KeyD']||touchRun;
  const doJ=K['ArrowUp']||K['KeyW']||K['Space'];
  const spd=touchMode?3.0:4.2;
  P.vx=goR&&!goL?spd:goL?-spd:0;
  if(goR&&!goL)P.right=true;if(goL)P.right=false;

  const wasOnG=P.onG;
  if(doJ&&!jDown&&P.jumps>0)doJump();
  if(!doJ)jDown=false;
  P.vy=Math.min(P.vy+.52,15);

  // X movement
  P.x+=P.vx;P.x=Math.max(0,Math.min(P.x,lvl.wW-PW));
  for(const pl of lvl.plats){if(!aabb(P.x,P.y,PW,PH,pl.x,pl.y,pl.w,pl.h))continue;if(P.vx>0)P.x=pl.x-PW;else P.x=pl.x+pl.w;P.vx=0;}
  // Y movement
  P.y+=P.vy;P.onG=false;
  for(const pl of lvl.plats){
    if(!aabb(P.x,P.y,PW,PH,pl.x,pl.y,pl.w,pl.h))continue;
    if(P.vy>=0&&P.y+PH-P.vy<=pl.y+5){
      P.y=pl.y-PH;P.vy=0;P.onG=true;
      if(!wasOnG)addParts(P.x-camX+PW/2,P.y+PH,10,['#666','#888'],2,.5,2.5);
    }else if(P.vy<0){P.y=pl.y+pl.h;P.vy=0;}
  }
  if(P.onG)P.jumps=2;
  if(P.vx!==0&&P.onG){P.wt++;if(P.wt>6){P.wt=0;P.wf=(P.wf+1)%4;}}else P.wf=0;
  if(P.y>IH+60){killP();return;}

  // Enemies — stomp check (fall on top) vs side hit
  for(const e of enems){
    if(e.stun>0){e.stun--;continue;}
    e.x+=e.vx;if(e.x<=e.mn||e.x+EW>=e.mx)e.vx*=-1;
    if(!aabb(P.x,P.y,PW,PH,e.x,e.y,EW,EH))continue;
    if(P.inv>0)continue;
    // Stomp: player falling fast + was above enemy
    if(P.vy>2&&P.y+PH-P.vy<=e.y+10){
      e.stun=180;P.vy=-7;P.jumps=2;snd_stomp();shakeAmt=2;
      addParts(e.x-camX+EW/2,e.y,22,[lvl.neonCol,'#ffffff','#ffff88'],4,1.2,3);
      flashes.push({x:e.x+EW/2,y:e.y+EH/2,r:0,a:.8,col:'#ffff88'});
    }else{killP();return;}
  }

  // Collect
  for(const c of colls){
    if(!c.got&&aabb(P.x,P.y,PW,PH,c.x-12,c.y-12,24,16)){
      c.got=true;photosGot++;snd_collect();shakeAmt=2;
      flashes.push({x:c.x,y:c.y,r:0,a:1,col:'#ffff88'});
      addParts(c.x-camX,c.y,24,[lvl.neonCol,'#ffff88','#ffffff'],4,1.2,3);
    }
  }
  if(colls.every(c=>c.got)){const ex=lvl.exit;if(aabb(P.x,P.y,PW,PH,ex.x,ex.y,28,36)){GS='levelcomplete';cTick=160;snd_lvl();shakeAmt=5;}}

  camXT=Math.max(0,Math.min(P.x-IW*.35,lvl.wW-IW));
  camX+=(camXT-camX)*.12;camX=Math.max(0,Math.min(camX,lvl.wW-IW));
  for(const f of flashes){f.r+=5;f.a-=.042;}flashes=flashes.filter(f=>f.a>0);
  updateParts();
  for(const e of bgEnts){if(e.type==='ptero'){e.x+=e.vx;e.phase+=.1;}else if(e.type==='car')e.x+=e.vx;}
  bgEnts=bgEnts.filter(e=>e.x>-100&&e.x<IW+100);
  for(const r of bgRipples){r.r+=4;r.a-=.028;}bgRipples=bgRipples.filter(r=>r.a>0);
}

function drawPlats(){
  const nc=lvl.neonCol,ng=lvl.neonGlow,beat=onBeat();
  for(const pl of lvl.plats){
    const wx=pl.x-camX,isMoving=!!pl.vx;
    // Proximity glow: brighter near player
    const dist=Math.abs((P.x+PW/2)-(pl.x+pl.w/2));
    const prox=Math.max(0,1-dist/250);
    g.fillStyle='#0d0d18';g.fillRect(wx,pl.y,pl.w,pl.h);
    g.fillStyle='#181828';for(let tx=wx;tx<wx+pl.w;tx+=10)g.fillRect(tx,pl.y+3,5,pl.h-3);
    // Moving platform: extra glow
    const glowAmt=(beat?16:10)+(prox*12)+(isMoving?8:0);
    g.shadowBlur=glowAmt;g.shadowColor=isMoving?'#ffffff':ng;
    g.fillStyle=isMoving?'#aaccff':nc;g.fillRect(wx,pl.y,pl.w,2);g.shadowBlur=0;
    g.fillStyle=isMoving?'rgba(160,200,255,.15)':`rgba(${nc==='#ff6600'?'255,102,0':'0,255,204'},.1)`;g.fillRect(wx,pl.y+2,pl.w,pl.h-2);

  }
}

  if(!P.onG&&GS==='playing'){g.shadowBlur=8;g.shadowColor='#4488ff';g.fillStyle=P.jumps>0?'#4488ff':'#222244';g.fillRect(IW-14,14,8,8);g.shadowBlur=0;}
  if(touchMode){
    const b=getBtnCenter(),rdy=flashCD===0;
    // Lauf-Button links (rund)
    // Links-Button (zuerst, links aussen)
    g.shadowBlur=touchRunLeft?14:4;g.shadowColor='#ffffff';
    g.fillStyle=touchRunLeft?'rgba(255,255,255,.25)':'rgba(20,20,30,.72)';
    g.beginPath();g.arc(RUN_R_X,RUN_Y,BTN_R,0,Math.PI*2);g.fill();
    g.strokeStyle=touchRunLeft?'#ffffff':'rgba(255,255,255,.5)';g.lineWidth=2;g.stroke();g.shadowBlur=0;
    g.fillStyle='#fff';g.font='bold 20px monospace';g.textAlign='center';g.fillText('◀',RUN_R_X,RUN_Y+8);
    // Rechts-Button (daneben)
    g.shadowBlur=touchRun?14:4;g.shadowColor='#ffffff';
    g.fillStyle=touchRun?'rgba(255,255,255,.25)':'rgba(20,20,30,.72)';
    g.beginPath();g.arc(RUN_L_X,RUN_Y,BTN_R,0,Math.PI*2);g.fill();
    g.strokeStyle=touchRun?'#ffffff':'rgba(255,255,255,.5)';g.lineWidth=2;g.stroke();g.shadowBlur=0;
    g.fillStyle='#fff';g.font='bold 20px monospace';g.fillText('▶',RUN_L_X,RUN_Y+8);
    // Sprung-Button oben rechts (rund)
    g.shadowBlur=6;g.shadowColor='#aaddff';
    g.fillStyle='rgba(20,30,50,.72)';
    g.beginPath();g.arc(b.rx,b.jy,BTN_R,0,Math.PI*2);g.fill();
    g.strokeStyle='rgba(170,221,255,.6)';g.lineWidth=2;g.stroke();g.shadowBlur=0;
    g.fillStyle='#aaddff';g.font='bold 22px monospace';g.fillText('▲',b.rx,b.jy+8);
    // Blitz-Button unten rechts (rund)
    g.shadowBlur=rdy?16:4;g.shadowColor=rdy?lvl.neonCol:'#333';
    g.fillStyle=rdy?'rgba(255,255,255,.13)':'rgba(20,20,20,.72)';
    g.beginPath();g.arc(b.rx,b.fy,BTN_R,0,Math.PI*2);g.fill();
    g.strokeStyle=rdy?lvl.neonCol:'rgba(255,255,255,.3)';g.lineWidth=rdy?2.5:1;g.stroke();g.shadowBlur=0;
    g.fillStyle=rdy?lvl.neonCol:'#888';g.font='bold 22px monospace';g.fillText('⚡',b.rx,b.fy+8);
    if(!rdy){g.strokeStyle=lvl.neonCol;g.lineWidth=3;g.shadowBlur=8;g.shadowColor=lvl.neonCol;g.beginPath();g.arc(b.rx,b.fy,BTN_R+5,-(Math.PI/2),-(Math.PI/2)+((80-flashCD)/80)*Math.PI*2);g.stroke();g.shadowBlur=0;}
    g.textAlign='left';
  }
}

// ── POST EFFECTS ──────────────────────────────────────────────────────────────
function drawScanlines(){
  g.fillStyle='rgba(0,0,0,.13)';for(let y=0;y<IH;y+=2)g.fillRect(0,y,IW,1);
  const vg=g.createRadialGradient(IW/2,IH/2,IH*.3,IW/2,IH/2,IH*.72);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.48)');g.fillStyle=vg;g.fillRect(0,0,IW,IH);
  if(flashAmt>0){g.fillStyle=`rgba(255,255,255,${flashAmt*.48})`;g.fillRect(0,0,IW,IH);}
}

// ── BIRTHDAY SCREEN ───────────────────────────────────────────────────────────
const BCOLS=['#ff4444','#ff8844','#ffee44','#44ee44','#4499ff','#dd44ff','#ff44aa'];
function drawBirthdayCake(cx,cy){
  g.fillStyle='#d0d0d0';g.fillRect(cx-66,cy+60,132,8); // plate
  g.shadowBlur=12;g.shadowColor='#ff8844';
  g.fillStyle='#cc5522';g.fillRect(cx-62,cy+28,124,34);g.fillStyle='#ee7733';g.fillRect(cx-62,cy+28,124,7);g.fillStyle='#dd6622';g.fillRect(cx-62,cy+48,124,12);
  g.fillStyle='#dd6633';g.fillRect(cx-50,cy+8,100,24);g.fillStyle='#ff8844';g.fillRect(cx-50,cy+8,100,6);
  g.fillStyle='#ee7744';g.fillRect(cx-36,cy-10,72,22);g.fillStyle='#ffaa66';g.fillRect(cx-36,cy-10,72,5);
  g.shadowBlur=0;g.fillStyle='#fff';
  for(let fx=cx-62;fx<cx+60;fx+=14)g.fillRect(fx,cy+26,8,6);
  for(let fx=cx-50;fx<cx+48;fx+=14)g.fillRect(fx,cy+6,8,6);
  for(let fx=cx-36;fx<cx+34;fx+=14)g.fillRect(fx,cy-12,7,6);
  BCOLS.forEach((c,i)=>{g.shadowBlur=6;g.shadowColor=c;g.fillStyle=c;g.fillRect(cx-46+i*13,cy+34,9,8);g.shadowBlur=0;});
  for(let i=0;i<9;i++){
    const canX=cx-44+i*11;g.fillStyle=BCOLS[i%7];g.fillRect(canX,cy-28,6,19);
    const fl=Math.sin(bdTick*.4+i)*2;
    g.shadowBlur=16;g.shadowColor=BCOLS[i%7];
    g.fillStyle='#ffff55';g.fillRect(canX+1,cy-38+fl,4,11);g.fillStyle='#ffaa00';g.fillRect(canX+1,cy-33+fl,4,6);
    g.fillStyle=BCOLS[i%7];g.globalAlpha=.1;g.beginPath();g.arc(canX+3,cy-30,14,0,Math.PI*2);g.fill();g.globalAlpha=1;g.shadowBlur=0;
  }
}
function drawBirthday(){
  bdTick++;
  g.fillStyle='#020410';g.fillRect(0,0,IW,IH);
  g.strokeStyle='rgba(80,0,255,.07)';g.lineWidth=.5;
  for(let y=0;y<IH;y+=22){g.beginPath();g.moveTo(0,y);g.lineTo(IW,y);g.stroke();}
  for(let x=0;x<IW;x+=22){g.beginPath();g.moveTo(x,0);g.lineTo(x,IH);g.stroke();}
  for(let i=0;i<60;i++){const cx=(i*71+bdTick*(0.4+i*.013))%IW,cy=(bdTick*(0.7+i*.018)+i*25)%IH;g.fillStyle=BCOLS[i%7];g.globalAlpha=.65;g.save();g.translate(cx,cy);g.rotate(i*.9+bdTick*.03);g.fillRect(-2,-2,5,4);g.restore();}g.globalAlpha=1;
  if(bdTick<20){g.fillStyle=`rgba(255,255,255,${(20-bdTick)/20})`;g.fillRect(0,0,IW,IH);}
  // Layout: HB text at top, ROMAN in upper third, cake in lower half, messages at bottom
  const cakeY=IH*.62+Math.max(0,(110-bdTick*3.5));  // slides up from below, rests at 62% height
  if(bdTick>14)drawBirthdayCake(IW/2,cakeY);
  const ta=Math.min(1,(bdTick-52)/38);
  if(bdTick>52){
    g.globalAlpha=ta;g.textAlign='center';
    const gAmt=20+8*Math.abs(Math.sin(bdTick*.04));
    // "HAPPY BIRTHDAY" near top
    g.shadowBlur=gAmt;g.shadowColor='#ffdd00';g.fillStyle='#ffee55';g.font='bold 28px monospace';g.fillText('HAPPY BIRTHDAY',IW/2,52);g.shadowBlur=0;
    // "ROMAN!" letters in upper area
    const lx=IW/2-118,lw=40;
    ['R','O','M','A','N','!'].forEach((ch,i)=>{
      if(i>=Math.min(6,Math.floor((bdTick-65)/9)))return;
      const pop=Math.min(1,(bdTick-65-i*9)/11);
      g.save();g.translate(lx+i*lw+20,108);g.scale(pop,pop);
      g.shadowBlur=26;g.shadowColor=BCOLS[i%7];g.fillStyle=BCOLS[i%7];g.font='bold 44px monospace';g.fillText(ch,0,0);g.shadowBlur=0;g.restore();
    });
    // Orbiting dots around "ROMAN!"
    if(bdTick>122){const orR=90;for(let i=0;i<7;i++){const a=bdTick*.055+i*(Math.PI*2/7);g.shadowBlur=12;g.shadowColor=BCOLS[i%7];g.fillStyle=BCOLS[i%7];g.fillRect(IW/2+Math.cos(a)*orR-4,108+Math.sin(a)*18-4,8,8);g.shadowBlur=0;}}
    // Bottom messages — below cake plate (cakeY+60 = ~284)
    if(bdTick>128){const t2=Math.min(1,(bdTick-128)/28);g.globalAlpha=ta*t2;g.shadowBlur=6;g.shadowColor='#8899ff';g.fillStyle='#aabbff';g.font='9px monospace';g.fillText('Du hast alle Momente festgehalten!',IW/2,IH-54);g.fillText('Möge dein Leben voller schöner Bilder sein.',IW/2,IH-40);g.shadowBlur=0;g.fillStyle='#334455';g.font='7px monospace';g.fillText('LEERTASTE / TIPPEN → Hauptmenü',IW/2,IH-26);}
    g.globalAlpha=1;g.textAlign='left';
  }
  g.fillStyle='rgba(0,0,0,.1)';for(let y=0;y<IH;y+=2)g.fillRect(0,y,IW,1);
}

// ── MENU ─────────────────────────────────────────────────────────────────────
function drawMenu(){
  g.fillStyle='#020412';g.fillRect(0,0,IW,IH);
  g.strokeStyle='rgba(60,60,255,.1)';g.lineWidth=.5;
  for(let y=0;y<IH;y+=22){g.beginPath();g.moveTo(0,y);g.lineTo(IW,y);g.stroke();}
  for(let x=0;x<IW;x+=22){g.beginPath();g.moveTo(x,0);g.lineTo(x,IH);g.stroke();}
  [[28,10],[72,22],[138,5],[198,18],[328,8],[425,20],[502,6],[88,50],[270,36],[555,18]].forEach(([x,y])=>{g.fillStyle=Math.sin(tick*.09+x)>.55?'#ffffff':'#6688aa';g.fillRect(x,y,2,2);});
  g.textAlign='center';
  g.shadowBlur=30;g.shadowColor='#ffdd00';g.fillStyle='#ffee44';g.font='bold 20px monospace';g.fillText("ROMAN'S FOTO-ABENTEUER",IW/2,62);g.shadowBlur=0;
  const p=.7+.3*Math.abs(Math.sin(tick*.04));
  g.shadowBlur=14*p;g.shadowColor='#ff44ff';g.fillStyle='#cc88ee';g.font='8px monospace';g.fillText('DINOLAND · TOKYO NEON · BAUSTELLE',IW/2,80);g.shadowBlur=0;
  // Animated camera — bobs, flashes periodically
  menuCamFlash=Math.max(0,menuCamFlash-.04);
  if(tick%90===45){menuCamFlash=1;snd_shutter();}
  const bob=Math.sin(tick*.025)*5;
  const csx=IW/2,csy=148+bob;
  g.save();g.translate(csx,csy);g.rotate(Math.sin(tick*.018)*.04);
  // Camera glow
  const cGlow=menuCamFlash>.5?35:18;
  g.shadowBlur=cGlow;g.shadowColor=menuCamFlash>.5?'#ffffff':'#00ffcc';
  g.fillStyle='#111';g.fillRect(-30,-18,60,38);g.strokeStyle=menuCamFlash>.5?'#ffffff':'#00ffcc';g.lineWidth=2;g.strokeRect(-30,-18,60,38);g.shadowBlur=0;
  g.fillStyle='#666';g.fillRect(-20,-26,28,10);
  // Lens glow
  const lGlow=menuCamFlash>.3?menuCamFlash*30:16;
  g.shadowBlur=lGlow;g.shadowColor=menuCamFlash>.3?'#ffffff':'#4488ff';
  g.fillStyle='#334455';g.beginPath();g.arc(0,0,14,0,Math.PI*2);g.fill();
  g.fillStyle='#5577aa';g.beginPath();g.arc(0,0,10,0,Math.PI*2);g.fill();
  g.fillStyle='#aaccee';g.beginPath();g.arc(0,0,6,0,Math.PI*2);g.fill();g.shadowBlur=0;
  g.fillStyle='rgba(255,255,255,.6)';g.beginPath();g.arc(-3,-3,2.5,0,Math.PI*2);g.fill();
  // Flash unit
  g.shadowBlur=menuCamFlash>0?menuCamFlash*25:10;g.shadowColor='#ffeeaa';g.fillStyle='#ffeeaa';g.fillRect(20,-18,12,9);g.shadowBlur=0;
  // Camera flash burst
  if(menuCamFlash>.0){
    g.globalAlpha=menuCamFlash*.7;g.shadowBlur=30;g.shadowColor='#ffffff';
    g.strokeStyle='#ffffff';g.lineWidth=2;g.beginPath();g.arc(0,0,menuCamFlash*80,0,Math.PI*2);g.stroke();
    g.lineWidth=1;g.globalAlpha=menuCamFlash*.3;g.beginPath();g.arc(0,0,menuCamFlash*40,0,Math.PI*2);g.stroke();
    g.shadowBlur=0;g.globalAlpha=1;
  }
  g.restore();
  // Screen flash on shutter
  if(menuCamFlash>.6){g.fillStyle=`rgba(255,255,255,${(menuCamFlash-.6)*1.5*.4})`;g.fillRect(0,0,IW,IH);}
  g.fillStyle='#6688cc';g.font='8px monospace';g.textAlign='center';
  g.fillText('◄► Bewegen  |  LEERTASTE/W Springen  |  ⚡[F] Blitzen',IW/2,200);
  g.fillText('Doppelsprung möglich!  |  Auf Gegner fallen = Stun  |  Federn = Supersprung',IW/2,212);
  g.fillText('📱 Tippen=Springen  |  ⚡-Button=Blitzen',IW/2,224);
  if(Math.floor(tick/25)%2===0){g.shadowBlur=12;g.shadowColor='#ffffff';g.fillStyle='#ffffff';g.font='bold 10px monospace';g.fillText('[ LEERTASTE / ENTER / TIPPEN ]',IW/2,248);g.shadowBlur=0;}
  g.textAlign='left';
}
function drawLevelComplete(){
  g.fillStyle='rgba(0,0,0,.6)';g.fillRect(0,0,IW,IH);g.textAlign='center';
  g.shadowBlur=22;g.shadowColor='#ffdd00';g.fillStyle='#ffdd00';g.font='bold 16px monospace';g.fillText('LEVEL GESCHAFFT!',IW/2,IH/2-22);g.shadowBlur=0;
  g.fillStyle='#aaddff';g.font='8px monospace';g.fillText('3 Fotos im Kasten!',IW/2,IH/2-4);
  if(Math.floor(cTick/18)%2===0){g.shadowBlur=9;g.shadowColor='#fff';g.fillStyle='#fff';g.font='9px monospace';g.fillText('LEERTASTE / TIPPEN → weiter',IW/2,IH/2+20);g.shadowBlur=0;}
  g.textAlign='left';
  // Auto-advance after ~6 s (360 frames) so the user is never stuck
  if(cTick<-200)nextLevel();
}
function drawGameOver(){
  g.fillStyle='rgba(0,0,5,.85)';g.fillRect(0,0,IW,IH);g.textAlign='center';
  g.shadowBlur=28;g.shadowColor='#ff0033';g.fillStyle='#ff2244';g.font='bold 22px monospace';g.fillText('GAME OVER',IW/2,IH/2-10);g.shadowBlur=0;
  g.fillStyle='#667788';g.font='8px monospace';g.fillText('LEERTASTE / TIPPEN → neu starten',IW/2,IH/2+16);g.textAlign='left';
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(){
  g.clearRect(0,0,IW,IH);
  if(GS==='birthday'){
    drawBirthday(); // no shake, no scanlines
  } else if(GS==='menu'){
    tick++;drawMenu(); // no shake on menu
    drawScanlines();
  } else {
    g.save();
    if(shakeAmt>0.4)g.translate((Math.random()-.5)*shakeAmt,(Math.random()-.5)*shakeAmt);
    if(GS==='gameover'){drawGameOver();}
    else{
      if(lvl.bg==='dino')bgDino();else if(lvl.bg==='tokyo')bgTokyo();else bgBau();
      drawPlats();drawColls();drawExit();drawEnems();drawPlayer();drawFX();drawHUD();
      if(GS==='levelcomplete'){cTick--;drawLevelComplete();}
      update();
    }
    drawScanlines();g.restore();
  }
  requestAnimationFrame(loop);
}
startBg(3);loop();
</script>
